---
name: "Tag & Release management"
on:
  push:
    tags:
    - 'v*.*.*'

# Default permissions for all jobs (least privilege)
permissions:
  contents: read

jobs:
  pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/eos-downloader
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication with PyPI
      attestations: write # Required for build attestations
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Load UV version
      id: versions
      run: |
        UV_VERSION=$(cat .github/python-versions.json | jq -r '.uv_version')
        echo "uv-version=$UV_VERSION" >> $GITHUB_OUTPUT
        echo "Using UV version: $UV_VERSION"

    - name: Install UV
      uses: astral-sh/setup-uv@v7
      with:
        version: ${{ steps.versions.outputs.uv-version }}
        enable-cache: true

    - name: Build package
      run: |
        uv build

    - name: Validate version matches tag
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PKG_VERSION=$(python3 -c "
        try:
            import tomllib
        except ImportError:
            import tomli as tomllib
        with open('pyproject.toml', 'rb') as f:
            data = tomllib.load(f)
        v = data['project']['version']
        print(v.lstrip('v'))
        ")
        echo "Tag version: $TAG_VERSION"
        echo "Package version: $PKG_VERSION"
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "::error::Version mismatch! Tag=$TAG_VERSION but pyproject.toml=$PKG_VERSION"
          exit 1
        fi

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        attestations: true

  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [ pypi ]
    permissions:
      contents: read
      packages: write # Required to push to GitHub Container Registry (ghcr.io)
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Docker meta for TAG
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ secrets.DOCKER_IMAGE }}
          ghcr.io/${{ secrets.DOCKER_IMAGE }}
        tags: |
          type=semver,pattern={{raw}}
          type=raw,value=latest

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  docker_in_docker:
    name: Docker Image Build with Docker support
    runs-on: ubuntu-latest
    needs: [ docker ]
    permissions:
      contents: read
      packages: write # Required to push to GitHub Container Registry (ghcr.io)
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Docker meta for TAG
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ secrets.DOCKER_IMAGE }}
          ghcr.io/${{ secrets.DOCKER_IMAGE }}
        tags: |
          type=semver,pattern={{raw}}-dind
          type=raw,value=latest-dind

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        file: Dockerfile.docker
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # Documentation deployment is now handled by the documentation.yml workflow
  # which is triggered automatically on tag push
  trigger-docs-deployment:
    name: "Trigger documentation deployment"
    runs-on: ubuntu-latest
    needs: [ docker_in_docker ]
    permissions:
      contents: read
    steps:
    - name: Documentation deployment info
      run: |
        echo "📚 Documentation deployment will be handled by the documentation.yml workflow"
        echo "🏷️  Tag: ${{ github.ref_name }}"
        echo "🔗 The documentation will be deployed automatically as version ${{ github.ref_name }} with alias 'stable'"
